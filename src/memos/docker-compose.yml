services:
  memos:
    image: neosmemo/memos:0.29.1
    container_name: memos
    restart: unless-stopped
    ports:
      - "5230:5230"
    volumes:
      - data:/var/opt/memos
    environment:
      MEMOS_PORT: 5230
      MEMOS_DRIVER: sqlite
      MEMOS_INSTANCE_URL: https://memos.${DOMAIN}

volumes:
  data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: ${APPDATA_LOCATION}